name: CI

on:
  push:
    branches: [main, claude/*, cursor/*]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/CODEOWNERS'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/CODEOWNERS'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tasktime
          POSTGRES_PASSWORD: tasktime
          POSTGRES_DB: tasktime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tasktime:tasktime@localhost:5432/tasktime_test
      JWT_SECRET: test-secret-key-minimum-length
      JWT_REFRESH_SECRET: test-refresh-secret-key-minimum
      NODE_ENV: test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run db:generate
      - run: cd backend && npm run lint
      - run: cd backend && npm run typecheck
      - run: cd backend && npm run build
      - run: cd backend && npm run db:migrate:deploy
      - name: Check schema/migration drift
        run: cd backend && npx prisma migrate diff --from-schema-datasource src/prisma/schema.prisma --to-schema-datamodel src/prisma/schema.prisma --exit-code
      - run: cd backend && npm test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_API_URL: /api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm run build

  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      pipeline-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pipeline
          POSTGRES_PASSWORD: pipeline
          POSTGRES_DB: pipeline_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pipeline:pipeline@localhost:5433/pipeline_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline-service/package-lock.json
      - run: cd pipeline-service && npm ci
      - run: cd pipeline-service && npm run db:generate
      - run: cd pipeline-service && npm run typecheck
      - run: cd pipeline-service && npm run build
      - run: cd pipeline-service && npm run db:migrate:deploy

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend, pipeline]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: pipeline-service/Dockerfile
          push: false
          cache-from: type=gha,scope=pipeline
          cache-to: type=gha,mode=max,scope=pipeline
