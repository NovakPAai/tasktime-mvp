name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/CODEOWNERS'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

jobs:
  review:
    name: AI Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          # Configurable via GitHub Repository Variables (Settings → Variables):
          # AI_REVIEW_MODEL      — default: gpt-4o-mini
          # AI_REVIEW_LANGUAGE   — default: Russian
          # AI_REVIEW_MAX_CHARS  — default: 80000
          # AI_REVIEW_FAIL_ON_CRITICAL — default: true (blocks merge on CRITICAL)
          AI_MODEL: ${{ vars.AI_REVIEW_MODEL || 'gpt-4o-mini' }}
          REVIEW_LANGUAGE: ${{ vars.AI_REVIEW_LANGUAGE || 'Russian' }}
          MAX_DIFF_CHARS: ${{ vars.AI_REVIEW_MAX_CHARS || '80000' }}
          FAIL_ON_CRITICAL: ${{ vars.AI_REVIEW_FAIL_ON_CRITICAL || 'true' }}
          # APPROVE_ON_CLEAN=true → createReview APPROVE + body 'AI-APPROVED'
          # APPROVE_ON_CLEAN=false → only comment (legacy mode)
          APPROVE_ON_CLEAN: ${{ vars.AI_REVIEW_APPROVE_ON_CLEAN || 'true' }}
        run: node .github/scripts/ai-review.mjs
