##############################################################
# Chromatic Visual Regression — TTUI-166
# Запускается: push в main или PR в main
# Требует: секрет CHROMATIC_PROJECT_TOKEN в GitHub Settings
#
# Для подключения:
#   1. Зарегистрировать проект на https://www.chromatic.com
#   2. Скопировать PROJECT_TOKEN
#   3. GitHub → Settings → Secrets → Actions → New secret
#      Name: CHROMATIC_PROJECT_TOKEN  Value: <token>
##############################################################
name: Chromatic Visual Regression

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/components/ui/**'
      - 'frontend/src/styles.css'
      - 'frontend/.storybook/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/components/ui/**'
      - 'frontend/src/styles.css'
      - 'frontend/.storybook/**'

jobs:
  chromatic:
    name: Visual Regression (Chromatic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # нужно для истории Chromatic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Storybook
        run: npm run build-storybook

      - name: Run Chromatic
        uses: chromaui/action@v11
        with:
          workingDir: frontend
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          # При изменениях не падать CI — только сигнализировать
          exitZeroOnChanges: true
          # Авто-принять изменения только для веток (не main)
          autoAcceptChanges: ${{ github.ref != 'refs/heads/main' }}
