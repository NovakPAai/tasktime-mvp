name: Build and Publish Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional custom image tag
        required: false
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  gate:
    name: Check PR approval
    runs-on: ubuntu-latest
    # Manual dispatch skips the gate — operator explicitly decided to publish
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check merged PR has approval
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('approved', 'true');
              return;
            }

            const sha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              per_page: 20,
            });

            const pr = prs.find(p => p.merge_commit_sha === sha || p.head.sha === sha);
            if (!pr) {
              core.warning(`No merged PR found for SHA ${sha} — assuming direct push, skipping gate`);
              core.setOutput('approved', 'true');
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const approved = reviews.some(r =>
              r.state === 'APPROVED' &&
              (r.user.type === 'User' || (r.body && r.body.includes('AI-APPROVED')))
            );

            if (!approved) {
              core.setFailed(`PR #${pr.number} has no approval — blocking publish`);
            }
            core.setOutput('approved', approved ? 'true' : 'false');

  build:
    name: Build and push images
    needs: gate
    if: needs.gate.outputs.approved == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      SOURCE_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: vars
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            PRIMARY_TAG="${{ github.event.inputs.image_tag }}"
          else
            PRIMARY_TAG="${SOURCE_SHA}"
          fi

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

          for svc in backend web pipeline; do
            img_name="tasktime-${svc}"
            [ "$svc" = "web" ] && img_name="tasktime-web"
            {
              echo "${svc}_tags<<EOF"
              echo "ghcr.io/${OWNER}/${img_name}:${PRIMARY_TAG}"
              echo "ghcr.io/${OWNER}/${img_name}:${SOURCE_SHA}"
              [ "${SOURCE_BRANCH}" = "main" ] && echo "ghcr.io/${OWNER}/${img_name}:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          done

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.backend_tags }}
          build-args: |
            GIT_SHA=${{ env.SOURCE_SHA }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.web_tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: pipeline-service/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.pipeline_tags }}
          build-args: |
            GIT_SHA=${{ env.SOURCE_SHA }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
          cache-from: type=gha,scope=pipeline
          cache-to: type=gha,mode=max,scope=pipeline
