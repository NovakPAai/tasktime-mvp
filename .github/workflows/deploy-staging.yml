name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: true
        type: string
      batch_id:
        description: Pipeline Service batch ID (for callback)
        required: false
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deploy assets
        run: |
          rsync -az deploy/ "${{ secrets.STAGING_DEPLOY_USER }}@${{ secrets.STAGING_DEPLOY_HOST }}:${{ secrets.STAGING_DEPLOY_PATH }}/deploy/"

      - name: Docker login on server
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | \
            ssh "${{ secrets.STAGING_DEPLOY_USER }}@${{ secrets.STAGING_DEPLOY_HOST }}" \
              "docker login ghcr.io -u ${{ github.actor }} --password-stdin" \
            || { echo "::error::Docker login failed"; exit 1; }

      - name: Inject secrets into backend env
        run: |
          ssh "${{ secrets.STAGING_DEPLOY_USER }}@${{ secrets.STAGING_DEPLOY_HOST }}" \
            bash -s -- \
              "${{ secrets.AI_PROVIDER }}" \
              "${{ secrets.ANTHROPIC_API_KEY }}" \
              "${{ secrets.STAGING_MCP_SERVICE_TOKEN }}" \
              "${{ secrets.MCP_AGENT_PASSWORD }}" \
              "${{ secrets.STAGING_DEPLOY_PATH }}" \
            <<'SSHEOF'
            ENV_FILE="$5/deploy/env/backend.staging.env"
            TMP_FILE=$(mktemp "${ENV_FILE}.XXXXXX")
            grep -v '^AI_PROVIDER=\|^ANTHROPIC_API_KEY=\|^MCP_SERVICE_TOKEN=\|^MCP_AGENT_PASSWORD=' \
              "$ENV_FILE" > "$TMP_FILE" || true
            printf 'AI_PROVIDER=%s\nANTHROPIC_API_KEY=%s\nMCP_SERVICE_TOKEN=%s\nMCP_AGENT_PASSWORD=%s\n' \
              "$1" "$2" "$3" "$4" \
              >> "$TMP_FILE"
            mv -f "$TMP_FILE" "$ENV_FILE"
          SSHEOF

      # TTSRH-1: feature flags are enabled on staging for UAT. Idempotent —
      # removes any prior FEATURES_* lines and re-appends the desired values,
      # so re-runs produce the same result.
      - name: Inject feature flags into backend env (staging)
        run: |
          ssh "${{ secrets.STAGING_DEPLOY_USER }}@${{ secrets.STAGING_DEPLOY_HOST }}" \
            bash -s -- "${{ secrets.STAGING_DEPLOY_PATH }}" \
            <<'SSHEOF'
            set -euo pipefail
            ENV_FILE="$1/deploy/env/backend.staging.env"
            if [ ! -f "$ENV_FILE" ]; then
              echo "::error::$ENV_FILE not found on staging host"; exit 1
            fi
            TMP_FILE=$(mktemp "${ENV_FILE}.XXXXXX")
            grep -v '^FEATURES_ADVANCED_SEARCH=\|^FEATURES_CHECKPOINT_TTQL=' \
              "$ENV_FILE" > "$TMP_FILE" || true
            printf 'FEATURES_ADVANCED_SEARCH=true\nFEATURES_CHECKPOINT_TTQL=true\n' \
              >> "$TMP_FILE"
            mv -f "$TMP_FILE" "$ENV_FILE"
          SSHEOF

      - name: Run remote deploy
        id: remote_deploy
        run: |
          set -euo pipefail
          ssh "${{ secrets.STAGING_DEPLOY_USER }}@${{ secrets.STAGING_DEPLOY_HOST }}" \
            "cd '${{ secrets.STAGING_DEPLOY_PATH }}' && chmod +x deploy/scripts/*.sh && ./deploy/scripts/deploy.sh staging '${{ inputs.image_tag }}'" \
          || { echo "::error::Remote deploy failed"; exit 1; }

      - name: Callback to Pipeline Service
        if: always() && inputs.batch_id != ''
        env:
          DEPLOY_STATUS: ${{ steps.remote_deploy.outcome == 'success' && 'SUCCESS' || 'FAILURE' }}
        run: |
          curl -sf -X POST "${{ secrets.PIPELINE_SERVICE_URL }}/api/batches/${{ inputs.batch_id }}/deploy-callback" \
            -H "x-pipeline-api-key: ${{ secrets.PIPELINE_SERVICE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"${DEPLOY_STATUS}\",\"target\":\"STAGING\",\"workflowRunId\":${{ github.run_id }},\"workflowRunUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
