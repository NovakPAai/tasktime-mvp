name: E2E Staging

on:
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to test against
        required: false
        type: string

concurrency:
  group: e2e-staging
  cancel-in-progress: true

jobs:
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      E2E_BASE_URL: ${{ inputs.base_url || secrets.STAGING_APP_URL || 'http://5.129.242.171:8080' }}
      E2E_API_BASE_URL: ${{ secrets.STAGING_API_URL || 'http://5.129.242.171:8080/api' }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_CLEANUP_EMAIL: ${{ secrets.E2E_CLEANUP_EMAIL }}
      E2E_CLEANUP_PASSWORD: ${{ secrets.E2E_CLEANUP_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CI: 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Wait for staging to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${E2E_BASE_URL}/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Staging did not become healthy in time"
          exit 1

      - name: Run Playwright E2E tests
        run: cd frontend && npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/e2e-report
            frontend/playwright-report
          retention-days: 14
