name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Timeweb VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: tasktime
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: bash /home/tasktime/deploy.sh
          script_stop: true

      - name: Notify on failure
        if: failure()
        run: echo "Deploy failed! Check logs on server: sudo journalctl -u tasktime -n 50"
