name: Update Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Job 1: Update CHANGELOG + auto-generated sections ─────────────────────
  auto-generate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          echo "routes=false"   >> "$GITHUB_OUTPUT"
          echo "schema=false"   >> "$GITHUB_OUTPUT"
          echo "modules=false"  >> "$GITHUB_OUTPUT"
          echo "frontend=false" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED" | grep -qE 'backend/src/modules/.*\.router\.ts'; then
            echo "routes=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q 'backend/src/prisma/schema.prisma'; then
            echo "schema=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q 'backend/src/app.ts'; then
            echo "modules=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q 'frontend/src/App.tsx'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        run: node scripts/generate-docs.js --changelog

      - name: Generate API reference
        if: steps.changes.outputs.routes == 'true'
        run: node scripts/generate-docs.js --routes

      - name: Generate data model docs
        if: steps.changes.outputs.schema == 'true'
        run: node scripts/generate-docs.js --schema

      - name: Generate backend modules docs
        if: steps.changes.outputs.modules == 'true'
        run: node scripts/generate-docs.js --modules

      - name: Generate frontend routes docs
        if: steps.changes.outputs.frontend == 'true'
        run: node scripts/generate-docs.js --frontend

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CHANGELOG.md .doc-sync-state \
                  docs/api/reference.md \
                  docs/architecture/data-model.md \
                  docs/architecture/backend-modules.md \
                  docs/architecture/frontend-architecture.md \
                  2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: auto-update docs [skip ci]"
            git push
          fi

  # ── Job 2: PR staleness check — ремайндер для разработчика ────────────────
  check-staleness:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for stale manual docs
        id: stale
        run: |
          OUTPUT=$(node scripts/generate-docs.js --stale 2>&1)
          echo "$OUTPUT"
          WARNINGS=$(echo "$OUTPUT" | grep "⚠️" || true)
          if [ -n "$WARNINGS" ]; then
            echo "has_warnings=true" >> "$GITHUB_OUTPUT"
            # Use heredoc format for multiline GITHUB_OUTPUT
            {
              echo "warnings<<WARNINGS_EOF"
              echo "$WARNINGS"
              echo "WARNINGS_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_warnings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: steps.stale.outputs.has_warnings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const warnings = `${{ steps.stale.outputs.warnings }}`;
            const body = `## 📋 Напоминание об обновлении документации

Следующие файлы изменились — требуется **ручное** обновление документации (контент нельзя сгенерировать автоматически):

\`\`\`
${warnings}
\`\`\`

> 💡 Авто-генерируемые секции (API reference, data model, routes) обновятся сами после мёрджа.
> Это напоминание только о контентной документации — \`docs/user-manual/\`, \`docs/guides/\`, \`docs/integrations/\`.
> Подробнее: [docs/guides/doc-workflow.md](../blob/main/docs/guides/doc-workflow.md)`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
