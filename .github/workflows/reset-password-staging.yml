name: Reset User Password (Staging)

# Ротация пароля для заданного email на staging БД. Использует backend-скрипт
# `rotate-password.ts` (bcrypt через сервис, invalidates refresh tokens + session).
#
# Security: пароль читается из GitHub Secret `E2E_CLEANUP_PASSWORD` (auto-masked
# в логах). Workflow_dispatch inputs НЕ маскируются автоматически — поэтому
# пароль не передаётся через input. Single source of truth: secret = DB password.
#
# Usage:
#   1. gh secret set E2E_CLEANUP_PASSWORD --env staging --body '<newpass>'
#   2. gh workflow run reset-password-staging.yml -f email=admin@tasktime.ru
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email (e.g. admin@tasktime.ru). Password берётся из secret E2E_CLEANUP_PASSWORD.'
        required: true
        default: 'admin@tasktime.ru'

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rotate password on staging backend
        env:
          EMAIL: ${{ github.event.inputs.email }}
          # secrets.* auto-masked в логах GitHub Actions.
          NEW_PASSWORD: ${{ secrets.E2E_CLEANUP_PASSWORD }}
        run: |
          if [ -z "$NEW_PASSWORD" ]; then
            echo "::error::Secret E2E_CLEANUP_PASSWORD не установлен. Выполни: gh secret set E2E_CLEANUP_PASSWORD --env staging --body '<newpass>'"
            exit 1
          fi
          EMAIL_B64=$(printf '%s' "$EMAIL" | base64 -w0)
          PASS_B64=$(printf '%s' "$NEW_PASSWORD" | base64 -w0)
          ssh "${{ secrets.STAGING_DEPLOY_USER }}@${{ secrets.STAGING_DEPLOY_HOST }}" \
            bash -s "$EMAIL_B64" "$PASS_B64" << 'REMOTE'
          set -euo pipefail
          EMAIL=$(echo "$1" | base64 -d)
          PASS=$(echo "$2" | base64 -d)
          # Docker-compose-agnostic container lookup. Compose (v1/v2) навешивает
          # canonical label `com.docker.compose.service=<service-name>` на
          # контейнеры — так находим backend без --env-file (иначе бы пришлось
          # знать все переменные всех сервисов).
          CONTAINER=$(docker ps \
            --filter "label=com.docker.compose.service=backend" \
            --format '{{.ID}}' | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "::error::backend-контейнер не найден (staging)"; exit 1
          fi
          docker exec \
            -e "ROTATE_PASSWORD_EMAIL=$EMAIL" \
            -e "ROTATE_PASSWORD_NEW_PASSWORD=$PASS" \
            "$CONTAINER" \
            node dist/scripts/rotate-password.js
          REMOTE
