name: Reset User Password (Staging)

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email (e.g. admin@tasktime.ru)'
        required: true
      new_password:
        description: 'New plain-text password (>= 8 chars). Hashed via bcrypt on the server — never stored in logs.'
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rotate password on staging backend
        env:
          EMAIL: ${{ github.event.inputs.email }}
          NEW_PASSWORD: ${{ github.event.inputs.new_password }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          echo "::add-mask::$NEW_PASSWORD"
          EMAIL_B64=$(printf '%s' "$EMAIL" | base64 -w0)
          PASS_B64=$(printf '%s' "$NEW_PASSWORD" | base64 -w0)
          PATH_B64=$(printf '%s' "$DEPLOY_PATH" | base64 -w0)
          ssh "${{ secrets.STAGING_DEPLOY_USER }}@${{ secrets.STAGING_DEPLOY_HOST }}" \
            bash -s "$EMAIL_B64" "$PASS_B64" "$PATH_B64" << 'REMOTE'
          set -euo pipefail
          EMAIL=$(echo "$1" | base64 -d)
          PASS=$(echo "$2" | base64 -d)
          DEPLOY_PATH=$(echo "$3" | base64 -d)
          cd "$DEPLOY_PATH"
          docker compose \
            --env-file deploy/env/backend.staging.env \
            -f deploy/docker-compose.staging.yml \
            exec -T \
            -e "ROTATE_PASSWORD_EMAIL=$EMAIL" \
            -e "ROTATE_PASSWORD_NEW_PASSWORD=$PASS" \
            backend \
            node dist/scripts/rotate-password.js
          REMOTE
